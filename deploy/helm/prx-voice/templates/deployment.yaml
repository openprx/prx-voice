apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-prx-voice
  labels:
    app: prx-voice
    region: {{ .Values.region.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: prx-voice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: prx-voice
        region: {{ .Values.region.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      terminationGracePeriodSeconds: {{ .Values.config.server.shutdownTimeoutSec }}
      containers:
        - name: prx-voice
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PRX_VOICE_SERVER__HOST
              value: "{{ .Values.config.server.host }}"
            - name: PRX_VOICE_SERVER__PORT
              value: "{{ .Values.service.port }}"
            - name: PRX_VOICE_LOGGING__LEVEL
              value: "{{ .Values.config.logging.level }}"
            - name: PRX_VOICE_ADAPTERS__DEFAULT_ASR_PROVIDER
              value: "{{ .Values.config.adapters.defaultAsrProvider }}"
            - name: PRX_VOICE_ADAPTERS__DEFAULT_AGENT_PROVIDER
              value: "{{ .Values.config.adapters.defaultAgentProvider }}"
            - name: PRX_VOICE_ADAPTERS__DEFAULT_TTS_PROVIDER
              value: "{{ .Values.config.adapters.defaultTtsProvider }}"
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: url
            {{- end }}
            {{- if .Values.secrets.deepgramApiKey }}
            - name: DEEPGRAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api-keys
                  key: deepgram-api-key
            {{- end }}
            {{- if .Values.secrets.openaiApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api-keys
                  key: openai-api-key
            {{- end }}
            {{- if .Values.secrets.azureSpeechKey }}
            - name: AZURE_SPEECH_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api-keys
                  key: azure-speech-key
            - name: AZURE_SPEECH_REGION
              value: "{{ .Values.secrets.azureSpeechRegion }}"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
