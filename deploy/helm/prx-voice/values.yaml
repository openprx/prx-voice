# PRX Voice Engine Helm Values

replicaCount: 2

image:
  repository: prx-voice
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: voice.prx.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

# Application config
config:
  server:
    host: "0.0.0.0"
    port: 3000
    shutdownTimeoutSec: 30

  session:
    maxDurationSec: 1800
    maxTurns: 100
    interruptEnabled: true
    defaultLanguage: "en-US"

  adapters:
    defaultAsrProvider: "mock"
    defaultAgentProvider: "mock"
    defaultTtsProvider: "mock"

  logging:
    level: "info"
    format: "json"

  limits:
    defaultMaxConcurrentSessions: 100
    eventBusCapacity: 4096
    apiRateLimitPerMin: 300

# Database
postgresql:
  enabled: true
  host: ""
  port: 5432
  database: prx_voice
  existingSecret: prx-voice-db-credentials

# Provider API keys
secrets:
  deepgramApiKey: ""
  openaiApiKey: ""
  azureSpeechKey: ""
  azureSpeechRegion: "eastus"

# Multi-region
region:
  name: "us-east-1"
  isPrimary: true
  failoverRegion: "us-west-2"

# Monitoring
monitoring:
  prometheus:
    enabled: true
    port: 3000
    path: /api/v1/metrics
  serviceMonitor:
    enabled: false

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
